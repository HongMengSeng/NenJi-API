<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>厨房管理系统 - 登录</title>
    <script src="js/v3.2.8/vue.global.prod.js" type="text/javascript" charset="utf-8"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top, rgba(211, 162, 57, 0.15), transparent 40%),
                linear-gradient(135deg, #fff9e6 0%, #f9e7c7 45%, #f0d9a9 100%);
        }

        .login-bg {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background:
                linear-gradient(rgba(255, 249, 230, 0.22), rgba(249, 231, 199, 0.38)),
                url('') center center / cover no-repeat;
        }

        .login-container {
            width: min(100%, 420px);
            padding: 40px 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 50px rgba(230, 184, 70, 0.15);
            backdrop-filter: blur(12px);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: rgba(184, 143, 46, 0.9);
        }

        .login-subtitle {
            margin-top: 10px;
            margin-bottom: 28px;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            color: #8B7355;
        }

        .login-input-group {
            margin-bottom: 18px;
        }

        .login-input-group label {
            display: block;
            margin-bottom: 8px;
            color: #8B7355;
            font-size: 14px;
            font-weight: 600;
        }

        .login-input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #f0d9a9;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .login-input-group input:focus {
            border-color: #E5B846;
            box-shadow: 0 0 0 4px rgba(230, 184, 70, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #E5B846 0%, #D3A239 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(230, 184, 70, 0.25);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #A0896A;
        }

        .login-footer a {
            color: #D3A239;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .error {
            min-height: 22px;
            margin-top: 14px;
            padding: 8px 10px;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            color: #9a5b3a;
            background: rgba(205, 153, 120, 0.12);
            border-radius: 8px;
        }

        .kitchen-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 12px;
            border-radius: 999px;
            background: rgba(211, 162, 57, 0.12);
            color: #B8922E;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
    <script src="js/api.js"></script>
</head>
<body>
    <div id="app">
        <div class="login-bg">
            <div class="login-container">
                <div class="login-title">厨房管理系统</div>
                <div style="text-align: center;">
                    <span class="kitchen-badge">厨房员工登录</span>
                </div>
                <div class="login-subtitle">请输入厨房账号和密码登录系统</div>
                <form @submit.prevent="login">
                    <div class="login-input-group">
                        <label for="username">账号</label>
                        <input
                            id="username"
                            v-model.trim="loginForm.username"
                            type="text"
                            placeholder="请输入厨房账号"
                            autocomplete="username"
                        />
                    </div>
                    <div class="login-input-group">
                        <label for="password">密码</label>
                        <input
                            id="password"
                            v-model="loginForm.password"
                            type="password"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                        />
                    </div>
                    <button class="login-btn" type="submit" :disabled="loading">
                        {{ loading ? '登录中...' : '登录' }}
                    </button>
                    <div v-if="errorMessage" class="error">{{ errorMessage }}</div>
                </form>
                <div class="login-footer">
                    <a href="login.html">返回管理员登录</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: false,
                    errorMessage: '',
                    loginForm: {
                        username: '',
                        password: ''
                    }
                };
            },
            methods: {
                async login() {
                    const username = this.loginForm.username.trim();
                    const password = this.loginForm.password;

                    if (!username) {
                        this.errorMessage = '请输入账号';
                        return;
                    }
                    if (!password) {
                        this.errorMessage = '请输入密码';
                        return;
                    }

                    this.loading = true;
                    this.errorMessage = '';

                    try {
                        const response = await fetch(FarmAPI.url('/api/kitchen/login'), {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: username,
                                password: password
                            })
                        });

                        const result = await FarmAPI.parseResponse(response);

                        if (response.ok && result.code === 200 && result.data) {
                            const token = result.data.token || '';
                            const userInfo = {
                                ...result.data,
                                username: result.data.username || username,
                                nickname: result.data.nickname || result.data.realName || result.data.username || username
                            };

                            // Store kitchen-specific auth
                            localStorage.setItem('kitchen_token', token);
                            localStorage.setItem('kitchen_user_info', JSON.stringify(userInfo));

                            // Store in standard auth keys for auth.js compatibility
                            localStorage.setItem('token', token);
                            localStorage.setItem('userInfo', JSON.stringify(userInfo));

                            window.location.href = 'kitchen.html';
                            return;
                        }

                        this.errorMessage = result.message || '登录失败，请检查账号密码';
                    } catch (error) {
                        console.error('Kitchen login request failed:', error);
                        this.errorMessage = '网络错误，请检查网络连接后重试';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
