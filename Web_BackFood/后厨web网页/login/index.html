<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后厨出餐管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="bg-effects">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
        <div class="grid-pattern"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 44 44" fill="none" width="48" height="48">
                        <rect x="2" y="2" width="40" height="40" rx="12" fill="url(#g1)"/>
                        <rect x="2" y="2" width="40" height="40" rx="12" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                        <path d="M14 21c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M22 13V9M18 11l4-2 4 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 30h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M17 26h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="g1" x1="0" y1="0" x2="44" y2="44">
                                <stop stop-color="#22c55e"/>
                                <stop offset="1" stop-color="#059669"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-title">后厨出餐管理系统</h1>
                <p class="brand-subtitle">Kitchen Order Management System</p>
            </div>

            <form class="field-group" id="login-form">
                <div class="input-field">
                    <input type="text" id="username" class="input" required autocomplete="username" placeholder=" ">
                    <label for="username" class="label">账号</label>
                </div>
                <div class="input-field">
                    <input type="password" id="password" class="input" required autocomplete="current-password" placeholder=" ">
                    <label for="password" class="label">密码</label>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">登录系统</span>
                    <span class="btn-loader">
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="31.4 31.4"/>
                        </svg>
                    </span>
                </button>

                <div class="error-message" id="error-message">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/>
                    </svg>
                    <span>账号或密码错误</span>
                </div>
            </form>

            <div class="login-footer">
                <p>v2.0 &middot; 内部使用</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
