<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后厨出餐管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="header-left">
                <div class="header-logo">
                    <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
                        <rect width="32" height="32" rx="8" fill="url(#h-g)"/>
                        <path d="M10 15c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M16 9V6M13 7.5l3-1.5 3 1.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M11 22h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M12.5 19h7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="h-g" x1="0" y1="0" x2="32" y2="32">
                                <stop stop-color="#22c55e"/><stop offset="1" stop-color="#059669"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>后厨出餐管理</h1>
                </div>
            </div>
            <div class="header-right">
                <div class="user-badge">
                    <span class="user-avatar" id="user-avatar">K</span>
                    <span><span id="current-username"></span></span>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" onclick="fetchOrders();fetchStatistics();">
                        <svg viewBox="0 0 16 16" fill="none" width="14" height="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 8a7 7 0 1114 0A7 7 0 011 8z"/>
                            <path d="M8 4.5V8l2.5 1.5"/>
                        </svg>
                        刷新
                    </button>
                    <button class="btn-icon btn-danger" onclick="logout()">
                        <svg viewBox="0 0 16 16" fill="none" width="14" height="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M11 11l3-3-3-3M14 8H6"/>
                        </svg>
                        退出
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <div class="container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon green">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">今日订单</span>
                    <span class="stat-value" id="stat-total-orders">—</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" width="22" height="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-label">已完成订单</span>
                    <span class="stat-value" id="stat-finished-orders">—</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amber">
                    <span style="font-size:24px;font-weight:700;line-height:1;">¥</span>
                </div>
                <div class="stat-body">
                    <span class="stat-label">今日营业额</span>
                    <span class="stat-value"><span class="currency">¥</span><span id="total-revenue">0</span></span>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="control-bar">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('pending')">待出餐</button>
                <button class="tab" onclick="switchTab('completed')">已完成</button>
            </div>
        </div>

        <!-- Order List -->
        <div class="order-list" id="order-list">
            <div class="loading-skeleton">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
